database:
  host: 10.132.80.118
  port: 54321
  database: synthesis
  user: postgres
  password: "123456"
  search_path: public
  connect_timeout: 10
  statement_timeout: 60000
  pool:
    min_size: 1
    max_size: 50

llm:
  provider: openai_compatible
  model: gemma-4-31B-it
  base_url: http://10.132.80.118:8999/v1
  api_key_env: EMPTY
  temperature: 0.2
  max_tokens: 8192
  timeout: 120
  max_retries: 2
  trust_env: false

synthesis:
  input_path: /private/tmp/sql_synthesis_coverage100_input.jsonl
  output_path: /private/tmp/synthesized_sql_coverage200_smoke.jsonl
  discard_output_path: /private/tmp/discard_sql_coverage200_smoke.jsonl
  parallel_workers: 3
  max_revision_rounds: 1
  difficulty_weights:
    easy: 6.0
    medium: 4.0
    hard: 2.0
    extra-hard: 1.0
  random_seed: 42
  num_sql_per_database:
    austin: 67
    chicago: 67
    nyc: 66

functions:
  postgis_function_json_path: /Users/songyang/Desktop/Paper/code/SpatialText2SQL/data/postgis_extracted.json
  st_function_markdown_path: /Users/songyang/Desktop/Paper/code/SpatialText2SQL/ST_Function.md
  st_function_only: true
  exclude_categories:
    - raster
    - topology

execution:
  enable_execution_check: true
  require_non_empty_result: false
  max_result_rows_for_check: 20
  execution_timeout: 5
  dry_run: false
  explain_only: true

logging:
  log_level: INFO
  log_path: /private/tmp/synthesized_sql_coverage200_smoke.log

# 评估配置文件

# 评估指标
metrics:
  - "execution_accuracy"  # EX指标：执行准确率

# 消融实验配置
ablation_configs:
  base:
    name: "Base"
    description: "Question + Schema"
    use_rag: false
    use_keyword: false
  
  rag:
    name: "+RAG"
    description: "Question + Schema + RAG"
    use_rag: true
    use_keyword: false
  
  keyword:
    name: "+Keyword"
    description: "Question + Schema + Keyword"
    use_rag: false
    use_keyword: true
  
  full:
    name: "+Both"
    description: "Question + Schema + RAG + Keyword"
    use_rag: true
    use_keyword: true

  prompt_enhanced:
    name: "Enhanced Prompt"
    description: "Question + Schema + dataset-specific prompt enhancement"
    use_rag: false
    use_keyword: false
    prompt_style: "prompt_enhanced"

# 默认使用的配置列表
default_configs:
  - "base"

prompt_styles:
  default:
    template_path: "prompts/text2sql_prompt.txt"
    include_sample_data: true
    use_dataset_context: false

  prompt_enhanced:
    template_path: "prompts/text2sql_prompt.txt"
    include_sample_data: true
    use_dataset_context: false
    dataset_specific: true

# RAG配置
rag:
  top_k: 5  # 返回top 5个最相关的文档
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
  vector_db_path: "data/indexes/vector/chroma"
  doc_source: "data/postgis_extracted.json"
  chunk_strategy: "function_id"  # 按function_id切分

# Keyword Search配置
keyword_search:
  top_k: 3  # 返回top 3个最相关的结果
  method: "tfidf"  # 使用TF-IDF方法
  doc_source: "data/postgis_extracted.json"

floodsql_pg:
  metadata:
    doc_source: "../FloodSQL-Bench/data/metadata_parquet.json"
    embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
    vector_db_path: "data/indexes/vector/floodsql"
    table_top_k_by_level:
      L0: 3
      L1: 4
      L2: 4
      L3: 5
      L4: 5
      L5: 5
    column_top_k: 5

# 评估运行配置
evaluation:
  timeout: 60  # SQL执行超时时间（秒）
  parallel_workers: 4  # 并行评估的worker数量
  save_details: true  # 是否保存详细结果

prediction_postprocess:
  enable_spatialsql_normalization: true
  enable_floodsql_normalization: true

# 结果输出配置
results:
  output_dir: "results"
  tasks_dir: "results/tasks"
  benchmarks_dir: "results/benchmarks"
  sessions_dir: "results/sessions"

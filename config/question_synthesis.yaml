database:
  host: 10.132.80.118
  port: 54321
  database: synthesis
  user: postgres
  password: "123456"
  connect_timeout: 10
  pool_min_size: 1
  pool_max_size: 50

llm:
  provider: openai_compatible
  model: gemma-4-31B-it
  base_url: http://10.132.80.118:8999/v1
  api_key_env: EMPTY
  temperature: 0.2
  max_tokens: 8192
  timeout: 120
  max_retries: 2

execution:
  enable_result_fetch: true
  execution_timeout: 30
  max_result_rows: 3

generation:
  sql_input_path: data/processed/synthesized_sql_queries.jsonl
  database_context_path: data/processed/synthesized_spatial_databases.jsonl
  output_path: data/processed/synthesized_questions.jsonl
  parallel_workers: 10
  num_questions_per_sql: 1
  max_revision_rounds: 1
  style_weights:
    conversational: 0.5
    formal: 0.8
    direct: 2.2
    concise: 2.0
    polite: 0.3
    analytical: 0.8
  random_seed: 42

logging:
  log_level: INFO
  log_path: ""

llm:
  provider: openai_compatible
  model: gemma-4-31B-it
  base_url: http://10.132.80.118:8999/v1
  api_key_env: EMPTY
  temperature: 0.2
  max_tokens: 8192
  timeout: 120
  max_retries: 2

generation:
  sql_input_path: data/processed/synthesized_sql_queries.jsonl
  database_context_path: data/processed/synthesized_spatial_databases.jsonl
  output_path: data/processed/synthesized_questions.jsonl
  num_questions_per_sql: 2
  max_revision_rounds: 1
  style_weights:
    conversational: 1.0
    formal: 1.0
    direct: 1.0
    concise: 1.0
    polite: 1.0
    analytical: 1.0
  random_seed: 42

logging:
  log_level: INFO
  log_path: ""

db_import:
  input_path: data/osm/new-york-260210
  # true: drop and re-import if table exists; false: skip existing table
  if_exists: false
  # Default: PostGIS
  target: postgis
  postgis:
    host: localhost
    port: 5432
    database: postgres
    user: postgres
    password: 123456
    schema: public

  # Alternative: Spatialite (uncomment to use)
  # target: spatialite
  # spatialite:
  #   path: data/osm/test_spatial.sqlite

vectorize:
  doc_source: data/postgis_extracted.json
  chroma_path: data/indexes/vector/chroma
  collection_name: postgis_extracted
  model_name: Qwen/Qwen3-Embedding-0.6B
  normalize_embeddings: true
  batch_size: 8


keyword_search:
  doc_source: data/postgis_extracted.json
  output_path: data/indexes/keyword/keyword_index.json
  min_token_length: 2

logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file_path: ../logs/preprocess/preprocess.log
  max_file_size_mb: 20
  backup_count: 5
  console: true

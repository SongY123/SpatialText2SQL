# 数据库连接配置 - 支持多数据库
databases:
  # spatial_qa 数据集使用的数据库（原有数据集）
  postgres:
    host: "10.132.80.204"
    port: 5432
    database: "postgres"
    user: "postgres"
    password: "123456"
    
    # 连接池配置
    pool:
      min_connections: 1
      max_connections: 10
      
    # 超时配置（秒）
    timeout:
      query_timeout: 60
      connection_timeout: 10
  
  # spatialsql_pg 数据集使用的独立数据库
  spatial_sql:
    host: "10.132.80.204"
    port: 5432
    database: "spatial_sql"
    user: "postgres"
    password: "123456"
    
    # 连接池配置
    pool:
      min_connections: 1
      max_connections: 10
      
    # 超时配置（秒）
    timeout:
      query_timeout: 60
      connection_timeout: 10

  floodsql:
    host: "10.132.80.204"
    port: 5432
    database: "floodsql"
    user: "postgres"
    password: "123456"

    pool:
      min_connections: 1
      max_connections: 10

    timeout:
      query_timeout: 60
      connection_timeout: 10


#  max_retries: 2

llm:
  provider: openai_compatible
  model: gemma-4-31B-it
  base_url: http://10.132.80.118:8999/v1
  api_key_env: EMPTY
  temperature: 0.2
  max_tokens: 8192
  timeout: 120
  max_retries: 2

synthesis:
  input_path: data/processed/synthesized_spatial_databases.jsonl
  output_path: data/processed/synthesized_sql_queries.jsonl
  discard_output_path: data/processed/discard_sql.jsonl
  parallel_workers: 10
  max_revision_rounds: 1
  # Example for all supported cities:
  # num_sql_per_database:
  #   nyc: 8
  #   lacity: 6
  #   chicago: 6
  #   seattle: 5
  #   sf: 7
  #   austin: 5
  #   phoenix: 5
#  num_sql_per_database:
#    nyc: 4
  difficulty_weights:
    easy: 6.0
    medium: 4.0
    hard: 2.0
    extra-hard: 1.0
  random_seed: 42

functions:
  postgis_function_json_path: data/postgis_extracted.json
  st_function_markdown_path: ST_Function.md
  exclude_categories:
    - raster
    - topology

execution:
  enable_execution_check: true
  require_non_empty_result: false
  max_result_rows_for_check: 20
  execution_timeout: 5
  dry_run: false
  explain_only: true

logging:
  log_level: INFO
  log_path: ""

database:
  host: localhost
  port: 54321
  database: synthesis
  user: postgres
  password: "123456"
  search_path: public
  connect_timeout: 10
  statement_timeout: 60000
  pool:
    min_size: 1
    max_size: 50

#llm:
#  provider: openai

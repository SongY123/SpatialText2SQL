# 数据集配置文件
datasets:
  spatial_qa:
    type: "excel"
    loader_class: "SpatialQALoader"
    data_path: "Spatial QA"
    database: "postgres"  # 使用 postgres 数据库
    levels: [1, 2, 3]
    columns:
      question: "Question"
      sql: "Reviewed Query"  # 使用审核后的标准SQL
    grouping:
      fields: ["level"]
      values:
        level: [1, 2, 3]

  # SpatialSQL 数据集（扩展：sdbdatasets 目录下 QA-*.txt，迁移到 PostgreSQL/PostGIS 后评估）
  spatialsql_pg:
    type: "qa_txt"
    loader_class: "SpatialSQLLoader"
    data_path: "sdbdatasets"
    database: "spatial_sql"  # 使用独立的 spatial_sql 数据库
    use_chinese_question: false
    use_sql_dialect_adapter: true  # SpatiaLite -> PostGIS 转换后落盘
    dataset_versions: ["dataset1", "dataset2"]
    domains: ["ada", "edu", "tourism", "traffic"]
    grouping:
      fields: ["split"]
      values:
        split:
          - "dataset1_ada"
          - "dataset1_edu"
          - "dataset1_tourism"
          - "dataset1_traffic"
          - "dataset2_ada"
          - "dataset2_edu"
          - "dataset2_tourism"
          - "dataset2_traffic"

  floodsql_pg:
    type: "benchmark_json"
    loader_class: "FloodSQLLoader"
    data_path: "../FloodSQL-Bench"
    database: "floodsql"
    use_sql_dialect_adapter: true
    sql_dialect_adapter: "duckdb_to_postgis"
    grouping:
      fields: ["level"]
      values:
        level: ["L0", "L1", "L2", "L3", "L4", "L5"]

# 默认数据集（保持原样，原流程不变）
default_dataset: "spatial_qa"

# 数据预处理配置
preprocessing:
  extract_schema: true  # 是否提取Schema
  schema_cache_dir: "data/schemas"  # Schema缓存目录
  output_dir: "data/preprocessed"  # 预处理输出目录
